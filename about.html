<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Diri</title>
    <link rel="stylesheet" type="text/css" href="style.css">

    <div style="text-align: center;">
        <img src="foto chel.jpg" width="200px" height="300px">

        <h1>
            <font color="hero pink">
                <font size="4"> Chelsea Olivia Massie </font>
            </font>
        </h1>
    </div>
</head>



<style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #96d69f, #f7fac5, #b5ffef);
            font-family: Arial, sans-serif;
            color: #ffffff;
        }

        div {
            width: 100%;
        }

        img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(199, 116, 162, 0.2);
            margin-top: 30px;
        }

        h1 {
            margin-top: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
        }

        p {
            background: rgba(235, 125, 117, 0.858);
            display: inline-block;
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-top: 20px;
            width: 70%;
            color: #f0f3b3
        }

        footer {
            margin-top: 30px;
            display: block;
            font-weight: bold;
            padding-bottom: 20px;
            color: #3c855e;
            font-style: oblique;
        }
    </style>
<body>
    <div style="text-align: center;">
        <p> Halo, nama saya Chelsea Olivia Massie. Saat ini saya sedang menempuh pendidikan <br> sebagai mahasiswa
            Terapi
            Gigi di
            Universitas Hasanuddin. <br>
            Saya suka warna yang cerah dan gemar mendengarkan musik. </p>
    </div>
</body>
<div style="text-align: center;">
    <footer> Jalan Perintis Kemerdekaan No.7</footer>
</div>

</html>
